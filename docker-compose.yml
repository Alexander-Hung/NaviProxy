services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      CADDY_ADMIN_BIND: 0.0.0.0
    ports:
      - "80:80"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
