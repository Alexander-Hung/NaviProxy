name: Bug report
description: Report a reproducible problem in NaviProxy.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, tokens, private domains, and private IPs where needed.
  - type: input
    id: version
    attributes:
      label: NaviProxy version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Admin
        2. Open Deploy
        3. Paste ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: runtime
    attributes:
      label: Runtime details
      description: Include relevant versions.
      placeholder: |
        Node:
        Docker:
        Docker Compose:
        Caddy:
        Docker Desktop / Colima / Linux Docker / rootless Docker:
  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      render: shell
